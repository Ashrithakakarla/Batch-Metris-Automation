name: Run Batch Metrics Automation

on:
  # Runs every day at 2:00 AM UTC — adjust as needed
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST
    - cron: '30 11 * * *'  # 5:00 PM IST
  # Manual trigger
  workflow_dispatch:

concurrency:
  group: batch-metrics-pipeline
  cancel-in-progress: false

jobs:
  run-batch-metrics:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run Batch_Metrics_Automation.py
      - name: Execute Batch_Metrics_Automation.py
        env:
          ASHRITHA_SECRET_KEY: ${{ secrets.ASHRITHA_SECRET_KEY }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          USERNAME: ${{ secrets.USERNAME }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          BATCH_METRICS_SHEET_KEY: ${{ secrets.BATCH_METRICS_SHEET_KEY }}

        run: |
          echo "=============================="
          echo "Workflow triggered at UTC: $(date -u)"
          echo "Current branch: $GITHUB_REF"
          echo "Repository path: $GITHUB_WORKSPACE"
          echo "=============================="
          echo "🚀 Starting Batch_Metrics_Automation.py..."
          echo "Using Metabase URL: ${METABASE_URL:0:25}****"
          echo "Using USERNAME variable: ${USERNAME:+[SET]}"

          python Batch_Metrics_Automation.py

          echo "✅ Batch_Metrics_Automation.py executed successfully."